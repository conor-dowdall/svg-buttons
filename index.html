<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="dist/settings-svg-button.js"></script>
    <script type="module" src="dist/edit-svg-button.js"></script>
    <script type="module" src="dist/resize-toggle-svg-button.js"></script>
    <title>SVG Buttons Demo</title>

    <style>
      :root {
        color-scheme: dark light;
      }

      .buttons > * {
        width: 3em;
        height: 3em;
      }
    </style>
  </head>
  <body>
    <div class="buttons">
      <settings-svg-button></settings-svg-button>
      <edit-svg-button></edit-svg-button>
      <resize-toggle-svg-button></resize-toggle-svg-button>
      <settings-svg-button
        button-aria-label="App Settings"
      ></settings-svg-button>
    </div>
  </body>
</html>
